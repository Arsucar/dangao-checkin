name: Daily Checkin

on:
  schedule:
    # 每天 UTC 时间 00:30 自动运行（北京时间早上 08:30）
    - cron: '30 0 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Checkin Script
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          USER_TOKEN: ${{ secrets.USER_TOKEN }}
        run: |
          python checkin.py

      - name: Update Token Secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "new_token.txt" ]; then
            echo "new_token.txt found. Updating USER_TOKEN secret..."
            gh secret set USER_TOKEN < new_token.txt
            rm new_token.txt
            echo "USER_TOKEN secret updated successfully."
          else
            echo "No new_token.txt found. Token update skipped."
          fi
